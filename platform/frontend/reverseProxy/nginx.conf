worker_processes auto;
user nginx;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Optional, but useful for logs while debugging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Docker DNS resolver
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    upstream platform-backend {
        zone platform_backend_zone 64k;
        server comp7705-platform-backend:9080 resolve;
    }

    server {
        listen 80;
        server_name _;

        # Proxy API MCP calls to backend container
        # /api/mcp/* -> http://platform-backend/mcp/*
        location ^~ /api/mcp {
            proxy_pass http://platform-backend/mcp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Important for MCP streaming/SSE
            proxy_buffering off;
            proxy_request_buffering off;
            client_max_body_size 0;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;
        }

        # Proxy API calls to backend container
        # /api/* -> http://platform-backend/*
        location /api/ {
            proxy_pass http://platform-backend/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Container image uploads (.tar); default 1m is too small
            client_max_body_size 0;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;
        }

        # Serve React SPA under / from /fs-root/dashboard/
        location / {
            root /fs-root/dashboard;
            try_files $uri $uri/ /index.html;
        }
    }
}